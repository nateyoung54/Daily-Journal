<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Veloura is a daily prompt for thoughtful self-reflection."
    />
    <title>Veloura</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>

    <main class="shell">
      <section class="panel prompt-stage">
        <header class="stage-top">
          <div class="brand-lockup">
            <div class="brand-mark" aria-hidden="true">V</div>
            <div>
              <p class="brand-name">Veloura</p>
              <p class="brand-subtitle">Daily prompt</p>
            </div>
          </div>

          <div class="meta-cluster">
            <div class="meta-item">
              <span class="meta-label">Date</span>
              <strong id="todayLabel">April 13, 2026</strong>
            </div>

            <label class="meta-item cadence-item" for="reminderTime">
              <span class="meta-label">Send daily</span>
              <div class="cadence-controls">
                <input id="reminderTime" type="time" value="20:30" />
                <button class="ghost-button" id="reminderButton" type="button">
                  Set
                </button>
              </div>
            </label>
          </div>
        </header>

        <div class="prompt-frame">
          <p class="prompt-title" id="promptTitle">Values and alignment</p>
          <blockquote id="dailyPrompt" class="daily-prompt"></blockquote>
          <div class="prompt-tags" id="promptTags"></div>
        </div>

        <footer class="stage-bottom">
          <p class="helper-text" id="reminderStatus"></p>
          <div class="prompt-actions">
            <button class="ghost-button" id="shufflePromptButton" type="button">
              Next prompt
            </button>
            <button class="primary-button" id="copyPromptButton" type="button">
              Copy prompt
            </button>
          </div>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
