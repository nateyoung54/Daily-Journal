name: Veloura Daily Prompt

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: veloura-daily-prompt
  cancel-in-progress: false

jobs:
  send-prompt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send Telegram prompt
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAILY_PROMPT_TIME: ${{ vars.DAILY_PROMPT_TIME }}
          DAILY_PROMPT_TIMEZONE: ${{ vars.DAILY_PROMPT_TIMEZONE }}
          PROMPT_STATE_FILE: .github/daily-prompt-state.json
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: node scripts/send-daily-prompt.js

      - name: Persist delivery state
        run: |
          if git diff --quiet -- .github/daily-prompt-state.json; then
            echo "No state changes to persist."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/daily-prompt-state.json
          git commit -m "Update daily prompt state"
          git push origin HEAD:${GITHUB_REF_NAME}
